services:
  - type: web
    name: dify-line-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: APP_ENV
        value: production
      - key: PORT
        value: 8080
      - key: LINE_CHANNEL_SECRET
        sync: false
      - key: LINE_CHANNEL_ACCESS_TOKEN
        sync: false
      - key: DIFY_API_BASE_URL
        value: https://api.dify.ai/v1
      - key: DIFY_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: dify-line-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: dify-line-redis
          type: redis
          property: connectionString
      - key: LOG_LEVEL
        value: INFO

  - type: worker
    name: dify-line-worker
    runtime: docker
    dockerfilePath: ./Dockerfile.worker
    plan: free
    envVars:
      - key: APP_ENV
        value: production
      - key: LINE_CHANNEL_SECRET
        sync: false
      - key: LINE_CHANNEL_ACCESS_TOKEN
        sync: false
      - key: DIFY_API_BASE_URL
        value: https://api.dify.ai/v1
      - key: DIFY_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: dify-line-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: dify-line-redis
          type: redis
          property: connectionString
      - key: LOG_LEVEL
        value: INFO

  - type: redis
    name: dify-line-redis
    plan: free
    ipAllowList:
      - source: 0.0.0.0/0
        description: Allow all

databases:
  - name: dify-line-db
    plan: free
    databaseName: linebot
    user: linebot
